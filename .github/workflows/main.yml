name: CI

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: test on ${{ matrix.os }}
    permissions:
      contents: read
      pull-requests: write
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macOS-latest]
    timeout-minutes: 30
    steps:
    - uses: actions/checkout@v4
    - uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          target/
        key: ${{ runner.os }}-cargo-test-stable-${{ hashFiles('**/Cargo.toml') }}
    - name: Install stable toolchain
      uses: dtolnay/rust-toolchain@stable
    - name: Install Dependencies
      run: sudo apt-get update; sudo apt-get install --no-install-recommends libasound2-dev libudev-dev libxtst-dev libevdev-dev libgtk-3-dev libxdo-dev xvfb --assume-yes
      if: runner.os == 'Linux'
    - name: Run tests (Linux)
      if: runner.os == 'Linux'
      run: xvfb-run --auto-servernum cargo test --verbose -- --nocapture
    - name: Run tests (non-Linux)
      if: runner.os != 'Linux'
      run: cargo test --verbose -- --nocapture

  clippy_check:
    name: Clippy
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
      - name: Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-clippy-${{ hashFiles('**/Cargo.toml') }}
      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Install Dependencies
        run: sudo apt-get update; sudo apt-get install --no-install-recommends libasound2-dev libudev-dev libxtst-dev libevdev-dev libgtk-3-dev libxdo-dev --assume-yes
      - name: Run clippy
        run: cargo clippy -- -D warnings

  format:
    name: Format
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Run cargo fmt
        run: cargo fmt --all -- --check

  build:
    name: build on ${{ matrix.os }}
    permissions:
      contents: read
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact-name: mantle-linux-x86_64
            binary-path: target/x86_64-unknown-linux-gnu/release/mantle
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact-name: mantle-windows-x86_64
            binary-path: target/x86_64-pc-windows-msvc/release/mantle.exe
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact-name: mantle-macos-aarch64
            binary-path: target/aarch64-apple-darwin/release/mantle
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact-name: mantle-macos-x86_64
            binary-path: target/x86_64-apple-darwin/release/mantle
    timeout-minutes: 60
    steps:
    - uses: actions/checkout@v4
    - uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          target/
        key: ${{ runner.os }}-cargo-build-release-${{ matrix.target }}-${{ hashFiles('**/Cargo.toml') }}
    - name: Install stable toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}
    - name: Install Dependencies
      run: sudo apt-get update; sudo apt-get install --no-install-recommends libasound2-dev libudev-dev libxtst-dev libevdev-dev libgtk-3-dev libxdo-dev --assume-yes
      if: runner.os == 'Linux'
    - name: Build release
      run: cargo build --release --target ${{ matrix.target }} --verbose
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact-name }}
        path: ${{ matrix.binary-path }}
        if-no-files-found: error

  release:
    name: Publish release
    needs: [build, test]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
      - name: Rename binaries for release
        run: |
          mv artifacts/mantle-linux-x86_64/mantle     mantle-linux-x86_64
          mv artifacts/mantle-macos-aarch64/mantle    mantle-macos-aarch64
          mv artifacts/mantle-macos-x86_64/mantle     mantle-macos-x86_64
          mv artifacts/mantle-windows-x86_64/mantle.exe mantle-windows-x86_64.exe
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            mantle-linux-x86_64
            mantle-macos-aarch64
            mantle-macos-x86_64
            mantle-windows-x86_64.exe
          generate_release_notes: true
